name: Haskell CI

on:
  push:
    branches: [ main ]
  pull_request:

# if the same user pushes again, cancel the in-progress pipeline
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
   strategy:
      matrix:
        # os: [ubuntu-latest, windows-latest, macos-latest]
        # TODO: issue: #53, cutting CI costs
        os: [ubuntu-latest]
        ghc: ['9.6']
      fail-fast: false

   runs-on: ${{ matrix.os }}

   steps:
     - uses: actions/checkout@v4
     - name: Set up GHC ${{ matrix.ghc }}
       uses: haskell-actions/setup@v2
       id: setup
       with:
         ghc-version: ${{ matrix.ghc }}
         cabal-version: 'latest'
         cabal-update: true

     - name: Build All VersePrototypes
       run: |
         cd VersePrototypes
         cabal build all
