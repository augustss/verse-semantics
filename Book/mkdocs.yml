site_name: Verse Language Documentation
site_url: https://augustss.github.io/verse-paper/
site_description: Comprehensive documentation for the Verse programming language
site_author: Jan Vitek

repo_name: augustss/verse-paper
repo_url: https://github.com/augustss/verse-paper
edit_uri: edit/main/Book/docs/

theme:
  name: material
  logo: images/verse.png
  palette:
    scheme: slate  # Dark theme
    primary: black
    accent: deep orange
  features:
#    - content.footnote.tooltips
#    - navigation.tabs
    - search.suggest

markdown_extensions:
 - admonition
 - pymdownx.details
 - footnotes
 - pymdownx.highlight:
      default_lang: verse
      linenums: false
      pygments_style: monokai
 - pymdownx.superfences

plugins:
  - search

extra_css:
  - extra.css

nav:
  - Home: index.md
  - Overview: 00_overview.md
  - Expressions: 01_expressions.md
  - Built-in Types: 02_builtins.md
  - Operators: 03_operators.md
  - Functions: 04_functions.md
  - Control Flow: 05_control.md
  - Failure: 06_failure.md
  - Type System: 07_types.md
  - Composite Types: 08_composites.md
  - Mutability: 09_mutability.md
  - Effects: 10_effects.md
  - Concurrency: 11_concurrency.md
  - Modules and Paths: 12_modules.md
  - Access Specifiers: 13_access.md
  - Persistable Types: 14_persistable.md
  - Code Evolution: 15_evolution.md
  - Live Variables: 16_live_variables.md
  - "📚 Concept Index": concept_index.md

